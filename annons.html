<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Объявления</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{
    --bg:#0b0f16;
    --bg-soft:#111826;
    --card:rgba(24,31,45,.88);
    --card-2:rgba(19,25,37,.95);
    --text:#f7f9fc;
    --sub:#9da9bb;
    --blue:#2b9df4;
    --blue-soft:rgba(43,157,244,.18);
    --red:#ff5f5f;
    --border:rgba(255,255,255,.08);
    --shadow:0 16px 40px rgba(0,0,0,.28);
}
.light{
    --bg:#eef3fa;
    --bg-soft:#ffffff;
    --card:rgba(255,255,255,.9);
    --card-2:rgba(255,255,255,.98);
    --text:#111827;
    --sub:#5f6b7a;
    --blue:#2b86ef;
    --blue-soft:rgba(43,134,239,.12);
    --border:rgba(17,24,39,.09);
    --shadow:0 16px 35px rgba(57,72,103,.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(43,157,244,.18), transparent 28%),
      radial-gradient(circle at bottom right, rgba(43,157,244,.1), transparent 30%),
      linear-gradient(180deg,var(--bg),#0f1520 60%,var(--bg));
    color:var(--text);
    transition:.3s;
}
body.light{background:linear-gradient(180deg,#f6f9ff,#eef3fa 65%,#e7eef8);}
.header-wrap,.container{max-width:1050px;margin:auto;padding:0 16px;}
header{padding:18px 0 14px;}
.header-box{
    position:relative;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
    border:1px solid var(--border);
    border-radius:24px;
    padding:24px 20px 18px;
    text-align:center;
    box-shadow:var(--shadow);
    backdrop-filter:blur(10px);
}
#backBtn{
    position:absolute;
    top:16px;
    left:16px;
    width:46px;
    height:46px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--blue),#37b1ff);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 12px 26px rgba(43,157,244,.28);
    transition:.25s;
}
#backBtn:hover{transform:translateY(-2px);}
#adminBtn{
    position:absolute;
    top:16px;
    right:16px;
    width:38px;
    height:38px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;cursor:pointer;transition:.25s;
}
#adminBtn:hover{border-color:rgba(43,157,244,.4);transform:translateY(-2px);}
.hero-icon{width:74px;height:74px;border-radius:22px;margin:0 auto 14px;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:34px;}
header h1{font-size:30px;margin-bottom:8px;}
header p{font-size:14px;color:var(--sub);max-width:560px;margin:0 auto 16px;line-height:1.5;}
.top-controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.ctrl-btn{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 14px;
    border-radius:12px;
    cursor:pointer;
    font-size:13px;
    transition:.25s;
}
.ctrl-btn:hover{transform:translateY(-2px);border-color:rgba(43,157,244,.45);}
.container{padding-bottom:34px;}
.add-panel,.feed-shell,.password-card{
    background:linear-gradient(180deg,var(--card),var(--card-2));
    border:1px solid var(--border);
    box-shadow:var(--shadow);
}
.add-panel{
    padding:18px;
    border-radius:22px;
    margin-bottom:18px;
    display:none;
}
.add-panel textarea{
    width:100%;min-height:110px;resize:vertical;
    background:rgba(0,0,0,.26);color:var(--text);
    border:1px solid var(--border);border-radius:16px;
    padding:14px;outline:none;margin-bottom:12px;
}
.add-panel input[type="file"]{display:block;width:100%;padding:12px;border:1px dashed var(--border);border-radius:14px;background:rgba(255,255,255,.02);color:var(--sub);margin-bottom:10px;}
.preview-files{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.preview-files img,.preview-files video{width:84px;height:84px;object-fit:cover;border-radius:12px;background:#000;border:1px solid var(--border);}
.action-btn,.delete-btn{
    border:none;color:#fff;padding:11px 16px;border-radius:14px;cursor:pointer;font-weight:700;transition:.25s;
}
.action-btn{background:linear-gradient(135deg,var(--blue),#37b1ff);box-shadow:0 12px 24px rgba(43,157,244,.26);}
.action-btn:hover,.delete-btn:hover{transform:translateY(-2px);}
.delete-btn{background:linear-gradient(135deg,var(--red),#ff7d7d);display:none;}
.feed-shell{padding:20px;border-radius:24px;}
.feed-head{display:flex;justify-content:space-between;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:14px;}
.feed-head h2{font-size:20px;}
.feed-note{font-size:13px;color:var(--sub);}
.post{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;transition:.25s;}
.post:hover{transform:translateY(-3px);border-color:rgba(43,157,244,.34);}
.post-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 0;}
.post-gallery img,.post-gallery video{width:100%;height:170px;object-fit:cover;border-radius:14px;background:#000;}
.post-content{padding:16px;font-size:15px;line-height:1.55;}
.post-date{font-size:12px;color:var(--sub);margin-top:10px;}
.post-actions{padding:0 16px 16px;}
.password-box{position:fixed;inset:0;background:rgba(4,8,15,.68);display:none;align-items:center;justify-content:center;padding:16px;z-index:1000;backdrop-filter:blur(6px);}
.password-card{padding:22px;border-radius:22px;width:100%;max-width:360px;}
.password-card h3{margin-bottom:8px;}
.password-card p{font-size:13px;color:var(--sub);margin-bottom:12px;}
.password-card input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(0,0,0,.22);color:var(--text);outline:none;margin-bottom:12px;}
.password-actions{display:flex;gap:10px;}
.password-actions button{flex:1;}
.secondary-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);}
.empty-state{padding:24px 18px;border-radius:18px;background:rgba(255,255,255,.03);border:1px dashed var(--border);text-align:center;color:var(--sub);}
@media(max-width:780px){
    header h1{font-size:25px;}
    .post-gallery{grid-template-columns:1fr 1fr;}
}
@media(max-width:520px){
    .header-wrap,.container{padding:0 12px;}
    .header-box{padding:20px 14px 16px;}
    #backBtn{top:12px;left:12px;width:42px;height:42px;border-radius:12px;}
    #adminBtn{top:12px;right:12px;}
    .hero-icon{width:64px;height:64px;font-size:30px;}
    .feed-shell,.add-panel,.password-card{padding:16px;}
    .post-gallery{grid-template-columns:1fr;}
    .post-gallery img,.post-gallery video{height:200px;}
}
</style>
</head>
<body>
<header>
  <div class="header-wrap">
    <div class="header-box">
      <button id="backBtn" aria-label="Назад"><i class="bi bi-arrow-left"></i></button>
      <button id="adminBtn" onclick="openPassword()">A</button>
      <div class="hero-icon"><i class="bi bi-megaphone"></i></div>
      <h1 data-ru="Объявления" data-kz="Хабарландырулар">Объявления</h1>
      <p data-ru="Важные сообщения, обновления и школьная информация в одном месте" data-kz="Маңызды хабарламалар, жаңартулар және мектеп туралы ақпарат бір жерде">Важные сообщения, обновления и школьная информация в одном месте</p>
      <div class="top-controls">
        <button class="ctrl-btn" onclick="toggleTheme()">🌗 Тема</button>
        <button class="ctrl-btn" onclick="setLang('ru')">RU</button>
        <button class="ctrl-btn" onclick="setLang('kz')">KZ</button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div id="addPanel" class="add-panel">
    <textarea id="postText" data-placeholder-ru="Текст объявления..." data-placeholder-kz="Хабарландыру мәтіні..." placeholder="Текст объявления..."></textarea>
    <input type="file" id="postImages" accept="image/*" multiple>
    <input type="file" id="postVideo" accept="video/*">
    <div class="preview-files" id="previewFiles"></div>
    <button class="action-btn" onclick="addPost()" data-ru="Добавить объявление" data-kz="Хабарландыру қосу">Добавить объявление</button>
  </div>

  <div class="feed-shell">
    <div class="feed-head">
      <h2 data-ru="Лента объявлений" data-kz="Хабарландырулар таспасы">Лента объявлений</h2>
      <div class="feed-note" data-ru="Здесь отображаются последние публикации" data-kz="Мұнда соңғы жарияланымдар көрсетіледі">Здесь отображаются последние публикации</div>
    </div>
    <div id="posts"></div>
  </div>
</div>

<div class="password-box" id="passwordBox">
  <div class="password-card">
    <h3 data-ru="Вход администратора" data-kz="Әкімші кіруі">Вход администратора</h3>
    <p data-ru="Введите пароль для управления объявлениями" data-kz="Хабарландыруларды басқару үшін пароль енгізіңіз">Введите пароль для управления объявлениями</p>
    <input type="password" id="passwordInput" data-placeholder-ru="Пароль администратора" data-placeholder-kz="Әкімші паролі" placeholder="Пароль администратора">
    <div class="password-actions">
      <button class="action-btn" onclick="checkPassword()" data-ru="Войти" data-kz="Кіру">Войти</button>
      <button class="action-btn secondary-btn" onclick="closePassword()" data-ru="Отмена" data-kz="Бас тарту">Отмена</button>
    </div>
  </div>
</div>

<script>
let isAdmin=false;
let currentLang='ru';

window.onload=function(){
    if(localStorage.getItem('isAdmin')==='true'){
        isAdmin=true;
        document.getElementById('addPanel').style.display='block';
    }
    loadPosts();
    updatePlaceholders();
};

function toggleTheme(){document.body.classList.toggle('light');}
function setLang(lang){
    currentLang=lang;
    document.querySelectorAll('[data-ru]').forEach(el=>{el.textContent=el.dataset[lang];});
    updatePlaceholders();
}
function updatePlaceholders(){
    document.querySelectorAll('[data-placeholder-ru]').forEach(el=>{el.placeholder=el.dataset['placeholder'+(currentLang==='ru'?'Ru':'Kz')];});
}

document.getElementById('backBtn').onclick=()=>location.href='index.html';
function openPassword(){document.getElementById('passwordBox').style.display='flex';}
function closePassword(){document.getElementById('passwordBox').style.display='none';document.getElementById('passwordInput').value='';}
function checkPassword(){
    const pass=document.getElementById('passwordInput').value;
    if(pass==='olesya2school'){
        isAdmin=true;
        localStorage.setItem('isAdmin','true');
        document.getElementById('addPanel').style.display='block';
        closePassword();
        updateAdminUI();
    }else{
        alert(currentLang==='ru'?'Неверный пароль':'Қате пароль');
        document.getElementById('passwordInput').value='';
    }
}

const postImagesInput=document.getElementById('postImages');
const postVideoInput=document.getElementById('postVideo');
const previewFiles=document.getElementById('previewFiles');
postImagesInput.addEventListener('change',updatePreview);
postVideoInput.addEventListener('change',updatePreview);

function updatePreview(){
    previewFiles.innerHTML='';
    const images=Array.from(postImagesInput.files).slice(0,3);
    const video=postVideoInput.files[0];
    images.forEach(file=>{
        const reader=new FileReader();
        reader.onload=e=>{
            const img=document.createElement('img');
            img.src=e.target.result;
            previewFiles.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
    if(video){
        const reader=new FileReader();
        reader.onload=e=>{
            const vid=document.createElement('video');
            vid.src=e.target.result;
            vid.controls=true;
            previewFiles.appendChild(vid);
        };
        reader.readAsDataURL(video);
    }
}

function addPost(){
    if(!isAdmin) return;
    const text=document.getElementById('postText').value.trim();
    const imagesFiles=Array.from(postImagesInput.files).slice(0,3);
    const videoFile=postVideoInput.files[0];
    if(!text && imagesFiles.length===0 && !videoFile) return;

    const imagesData=[];
    let videoData=null;
    let loadedCount=0;
    const totalFiles=imagesFiles.length+(videoFile?1:0);

    if(totalFiles===0){
        savePost(text,[],null);
        resetInputs();
        return;
    }

    imagesFiles.forEach((file,index)=>{
        const reader=new FileReader();
        reader.onload=e=>{
            imagesData[index]=e.target.result;
            loadedCount++;
            if(loadedCount===totalFiles) finishPost();
        };
        reader.readAsDataURL(file);
    });

    if(videoFile){
        const reader=new FileReader();
        reader.onload=e=>{
            videoData=e.target.result;
            loadedCount++;
            if(loadedCount===totalFiles) finishPost();
        };
        reader.readAsDataURL(videoFile);
    }

    function finishPost(){
        savePost(text,imagesData,videoData);
        resetInputs();
    }
}

function resetInputs(){
    document.getElementById('postText').value='';
    postImagesInput.value='';
    postVideoInput.value='';
    previewFiles.innerHTML='';
}

function savePost(text,images,video){
    const posts=JSON.parse(localStorage.getItem('posts'))||[];
    posts.unshift({text,images,video,date:new Date().toLocaleDateString('ru-RU')});
    localStorage.setItem('posts',JSON.stringify(posts));
    renderPosts();
}

function loadPosts(){renderPosts();}

function renderPosts(){
    const container=document.getElementById('posts');
    container.innerHTML='';
    const posts=JSON.parse(localStorage.getItem('posts'))||[];

    if(posts.length===0){
        const empty=document.createElement('div');
        empty.className='empty-state';
        empty.textContent=currentLang==='ru'?'Пока объявлений нет':'Әзірге хабарландыру жоқ';
        container.appendChild(empty);
        return;
    }

    posts.forEach((post,index)=>{
        const postEl=document.createElement('div');
        postEl.className='post';

        if((post.images && post.images.length>0) || post.video){
            const gallery=document.createElement('div');
            gallery.className='post-gallery';
            (post.images||[]).forEach(src=>{
                const img=document.createElement('img');
                img.src=src;
                gallery.appendChild(img);
            });
            if(post.video){
                const vid=document.createElement('video');
                vid.src=post.video;
                vid.controls=true;
                gallery.appendChild(vid);
            }
            postEl.appendChild(gallery);
        }

        const content=document.createElement('div');
        content.className='post-content';
        content.innerHTML=post.text.replace(/\n/g,'<br>');
        const date=document.createElement('div');
        date.className='post-date';
        date.textContent=post.date;
        content.appendChild(date);
        postEl.appendChild(content);

        const actions=document.createElement('div');
        actions.className='post-actions';
        const del=document.createElement('button');
        del.className='delete-btn';
        del.textContent=currentLang==='ru'?'Удалить':'Жою';
        del.onclick=()=>deletePost(index);
        actions.appendChild(del);
        postEl.appendChild(actions);

        container.appendChild(postEl);
    });
    updateAdminUI();
}

function deletePost(index){
    const posts=JSON.parse(localStorage.getItem('posts'))||[];
    posts.splice(index,1);
    localStorage.setItem('posts',JSON.stringify(posts));
    renderPosts();
}

function updateAdminUI(){
    document.querySelectorAll('.delete-btn').forEach(btn=>{
        btn.style.display=isAdmin?'inline-flex':'none';
    });
}
</script>
</body>
</html>
