<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Объявления</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.annons{
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#1a1a1a;
border:1px solid #2a2a2a;
border-radius:10px;
padding:20px;
}

.date{
font-size:12px;
color:#aaa;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Объявления</h1>

<div class="annons" id="annons"></div>

<script>

fetch("annons.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("annons");

data.forEach(post => {

container.innerHTML += `
<div class="card">
<div class="date">${post.date}</div>
<h3>${post.title}</h3>
<p>${post.text}</p>
</div>
`;

});

})
.catch(() => {

document.getElementById("annons").innerHTML =
"<p style='text-align:center'>Ошибка загрузки объявлений</p>";

});

</script>

</body>
</html>
