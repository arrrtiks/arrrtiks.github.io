<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Школьная галерея</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
  --bg:#0b0f16;
  --card:rgba(24,31,45,.9);
  --card-2:rgba(18,24,36,.94);
  --text:#f8fbff;
  --sub:#9ba7ba;
  --blue:#2b9df4;
  --blue-soft:rgba(43,157,244,.15);
  --border:rgba(255,255,255,.08);
  --red:#ff4d4d;
  --shadow:0 18px 38px rgba(0,0,0,.28);
}
.light {
  --bg:#eef3fa;
  --card:rgba(255,255,255,.92);
  --card-2:rgba(255,255,255,.98);
  --text:#111827;
  --sub:#637083;
  --blue:#2b86ef;
  --blue-soft:rgba(43,134,239,.12);
  --border:rgba(17,24,39,.08);
  --shadow:0 16px 32px rgba(57,72,103,.12);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(43,157,244,.16), transparent 26%),
    radial-gradient(circle at bottom right, rgba(43,157,244,.08), transparent 28%),
    linear-gradient(180deg,var(--bg),#0f1520 60%,var(--bg));
  color:var(--text);
  transition:.3s;
}
body.light{background:linear-gradient(180deg,#f6f9ff,#eef3fa 65%,#e7eef8);}
header {
  max-width:860px;
  margin:18px auto 0;
  padding:0 14px;
}
.header-box{
  padding:24px 18px 18px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:24px;
  background:linear-gradient(180deg,var(--card),var(--card-2));
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
header h1 { font-size:28px; margin-bottom:10px; }
.top-controls { display:flex; justify-content:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
.ctrl-btn {
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
  transition:.25s;
}
.ctrl-btn:hover{transform:translateY(-2px);border-color:rgba(43,157,244,.4);}
.container { max-width:860px; margin:20px auto; padding:0 14px 24px; }
.card {
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:20px;
  padding:12px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  align-items:center;
}
.card img {
  width:100%;
  height:auto;
  max-height:460px;
  border-radius:14px;
  object-fit:contain;
  background:#000;
}
.date {
  font-size:12px;
  color:var(--sub);
  margin-top:10px;
  align-self:flex-start;
  padding-left:2px;
}
.reactions {
  display:flex;
  justify-content:space-between;
  width:100%;
  margin-top:10px;
  gap:8px;
  font-size:14px;
  flex-wrap:wrap;
}
.reaction {
  cursor:pointer;
  user-select:none;
  padding:8px 10px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  flex:1;
  min-width:70px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  transition:.25s;
}
.reaction:hover,.reaction.active { background: var(--blue-soft); border-color:rgba(43,157,244,.35); }
#adminBtn {
  position:absolute; top:14px; right:14px; width:30px; height:30px; border:none;
  border-radius:8px; font-weight:bold; font-size:16px; text-align:center; cursor:pointer;
  background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border);
}
#passwordModal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(4,9,17,.7); justify-content:center; align-items:center; z-index:1000;
}
#passwordModal .modal-content {
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  padding:20px; border-radius:18px; display:flex; flex-direction:column; align-items:center; gap:10px;
  box-shadow:var(--shadow);
}
#passwordModal input { width:220px; text-align:center; background:#0b1220; color:#fff; border:1px solid var(--border); border-radius:10px; padding:10px; }
#passwordModal button { padding:8px 14px; border-radius:10px; }
#userPanel { display:flex; justify-content:center; margin-bottom:18px; }
.tg-btn {
  background:linear-gradient(135deg,var(--blue),#37b1ff);
  color:#fff; text-decoration:none; display:inline-flex; align-items:center; gap:8px;
  font-size:17px; padding:14px 22px; border-radius:16px; transition:.25s; box-shadow:0 14px 28px rgba(43,157,244,.25);
}
.tg-btn:hover { transform:translateY(-3px); }
.add-btn,.delete-btn {
  cursor:pointer; border:none; padding:9px 12px; border-radius:12px; font-weight:bold; margin-top:10px; transition:.25s;
}
.add-btn { background:#2b9df4; color:#fff; }
.delete-btn { background:#ff4d4d; color:#fff; }
#backBtn {
  position:absolute; top:14px; left:14px; width:46px; height:46px; background:linear-gradient(135deg,var(--blue),#37b1ff);
  border:none; border-radius:14px; display:flex; justify-content:center; align-items:center; cursor:pointer; transition:.25s; box-shadow:0 12px 25px rgba(43,157,244,.22);
}
#backBtn:hover { transform:translateY(-2px); }
#backBtn svg { display:block; }
#adminPanel{
  display:none; margin-bottom:14px; padding:16px; border-radius:18px; border:1px solid var(--border);
  background:linear-gradient(180deg,var(--card),var(--card-2)); box-shadow:var(--shadow);
}
#fileInput{color:var(--sub); margin-bottom:10px; width:100%;}
@media(max-width:600px){
  header h1{font-size:24px; padding-top:18px;}
  .card img{max-height:280px;}
  .tg-btn{font-size:15px;padding:12px 18px;}
  #passwordModal input{width:170px;}
  .reaction{min-width:calc(50% - 4px);}
}
</style>
</head>
<body>
<header>
  <div class="header-box">
    <button id="backBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8L10 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 data-ru="Школьная галерея" data-kz="Мектеп галереясы">Школьная галерея</h1>
    <div class="top-controls">
      <button class="ctrl-btn" onclick="toggleTheme()">🌗 Тема</button>
      <button class="ctrl-btn" onclick="setLang('ru')">RU</button>
      <button class="ctrl-btn" onclick="setLang('kz')">KZ</button>
    </div>
    <button id="adminBtn">A</button>
  </div>
</header>

<div class="container">
  <div id="adminPanel">
    <input type="file" id="fileInput" accept="image/*">
    <button class="add-btn" id="addPhotoBtn">Добавить</button>
  </div>

  <div id="userPanel">
    <a class="tg-btn" href="https://t.me/gasaicvv" target="_blank"><i class="bi bi-telegram"></i>Предложить контент</a>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<div id="passwordModal">
  <div class="modal-content">
    <p data-ru="Введите пароль администратора:" data-kz="Әкімші паролін енгізіңіз:">Введите пароль администратора:</p>
    <input type="password" id="adminPassword" placeholder="Пароль">
    <div>
      <button class="add-btn" id="submitPassword">Войти</button>
      <button class="delete-btn" id="cancelPassword">Отмена</button>
    </div>
  </div>
</div>

<script>
let isAdmin=false;
const ADMIN_PASSWORD="olesya2school";
const galleryEl=document.getElementById('gallery');
const adminPanel=document.getElementById('adminPanel');
const userPanel=document.getElementById('userPanel');
const adminBtn=document.getElementById('adminBtn');
const fileInput=document.getElementById('fileInput');
const passwordModal=document.getElementById('passwordModal');
const adminPassword=document.getElementById('adminPassword');
const submitPassword=document.getElementById('submitPassword');
const cancelPassword=document.getElementById('cancelPassword');
const backBtn=document.getElementById('backBtn');
let galleryData=JSON.parse(localStorage.getItem('galleryData')||'[]');
function toggleTheme(){document.body.classList.toggle('light');}
function setLang(lang){document.querySelectorAll('[data-ru]').forEach(el=>{el.textContent=el.dataset[lang];});}
function renderGallery(){
  galleryEl.innerHTML='';
  galleryData.forEach((item,index)=>{
    const card=document.createElement('div'); card.className='card';
    const img=document.createElement('img'); img.src=item.src; card.appendChild(img);
    const dateEl=document.createElement('div'); dateEl.className='date'; dateEl.textContent=item.date||''; card.appendChild(dateEl);
    const reactions=document.createElement('div'); reactions.className='reactions';
    ['👍','👎','🔥','😭'].forEach(emoji=>{
      const btn=document.createElement('div'); btn.className='reaction';
      btn.innerHTML=`${emoji} <span>${item[emoji]||0}</span>`;
      btn.onclick=()=>{
        if(!item.user)item.user={};
        if(item.user.selected===emoji)return;
        if(item.user.selected)item[item.user.selected]--;
        item[emoji]++; item.user.selected=emoji; saveData(); renderGallery();
      };
      reactions.appendChild(btn);
    });
    card.appendChild(reactions);
    if(isAdmin){
      const delBtn=document.createElement('button'); delBtn.className='delete-btn';
      delBtn.textContent='Удалить';
      delBtn.onclick=()=>{galleryData.splice(index,1); saveData(); renderGallery();};
      card.appendChild(delBtn);
    }
    galleryEl.appendChild(card);
  });
}
function saveData(){localStorage.setItem('galleryData',JSON.stringify(galleryData));}
adminBtn.onclick=()=>{ passwordModal.style.display='flex'; adminPassword.value=''; adminPassword.focus(); }
submitPassword.onclick=()=>{
  if(adminPassword.value===ADMIN_PASSWORD){
    isAdmin=true; adminPanel.style.display='block'; userPanel.style.display='none'; adminBtn.style.display='none'; passwordModal.style.display='none'; renderGallery();
  } else { alert('Неверный пароль'); adminPassword.value=''; adminPassword.focus(); }
}
cancelPassword.onclick=()=>{ passwordModal.style.display='none'; }
document.getElementById('addPhotoBtn').onclick=()=>{
  const file=fileInput.files[0];
  if(!file){alert('Выберите файл'); return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const now=new Date();
    const dateStr=now.toLocaleDateString('ru-RU');
    galleryData.push({src:e.target.result,'👍':0,'👎':0,'🔥':0,'😭':0,date:dateStr});
    saveData(); renderGallery();
  }
  reader.readAsDataURL(file); fileInput.value='';
}
backBtn.onclick=()=>{ window.location.href='index.html'; }
renderGallery();
</script>
</body>
</html>
