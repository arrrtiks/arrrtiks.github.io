<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Галерея</title>

<style>

body{
font-family: Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
border:1px solid #2a2a2a;
}

.card img{
width:100%;
display:block;
}

.info{
padding:15px;
}

.date{
font-size:12px;
color:#aaa;
margin-bottom:5px;
}

</style>
</head>

<body>

<h1>Галерея школы</h1>

<div class="gallery" id="gallery"></div>

<script>

fetch("gallery.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("gallery");

data.forEach(post => {

container.innerHTML += `
<div class="card">
<img src="${post.image}">
<div class="info">
<div class="date">${post.date}</div>
<div>${post.title}</div>
</div>
</div>
`;

});

})
.catch(() => {

document.getElementById("gallery").innerHTML =
"<p style='text-align:center'>Ошибка загрузки галереи</p>";

});

</script>

</body>
</html>
