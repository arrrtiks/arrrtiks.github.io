<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мероприятия</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{
  --bg:#0b0f16;
  --card:rgba(24,31,45,.9);
  --card-2:rgba(18,24,36,.94);
  --text:#f8fbff;
  --sub:#9ba7ba;
  --blue:#2b9df4;
  --blue-soft:rgba(43,157,244,.15);
  --border:rgba(255,255,255,.08);
  --shadow:0 18px 38px rgba(0,0,0,.28);
  --red:#ff4d4d;
}
.light{
  --bg:#eef3fa;
  --card:rgba(255,255,255,.92);
  --card-2:rgba(255,255,255,.98);
  --text:#111827;
  --sub:#637083;
  --blue:#2b86ef;
  --blue-soft:rgba(43,134,239,.12);
  --border:rgba(17,24,39,.08);
  --shadow:0 16px 32px rgba(57,72,103,.12);
  --red:#ff4d4d;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(43,157,244,.16), transparent 26%),
    radial-gradient(circle at bottom right, rgba(43,157,244,.08), transparent 28%),
    linear-gradient(180deg,var(--bg),#0f1520 60%,var(--bg));
  color:var(--text);
  transition:.3s;
}
body.light{background:linear-gradient(180deg,#f6f9ff,#eef3fa 65%,#e7eef8);}
.wrapper{max-width:980px;margin:18px auto;padding:0 14px 26px;}
.hero{
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:26px;
  box-shadow:var(--shadow);
  padding:26px 20px 20px;
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:"";
  position:absolute;
  right:-40px;
  top:-40px;
  width:150px;
  height:150px;
  border-radius:50%;
  background:var(--blue-soft);
  filter:blur(12px);
}
#backBtn{
  position:absolute; top:16px; left:16px; width:46px; height:46px; border:none; border-radius:14px;
  display:flex; justify-content:center; align-items:center; cursor:pointer;
  background:linear-gradient(135deg,var(--blue),#37b1ff); box-shadow:0 12px 25px rgba(43,157,244,.22);
}
.hero h1{text-align:center;font-size:30px;margin-bottom:10px;position:relative;z-index:1;}
.top-controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;position:relative;z-index:1;}
.ctrl-btn{
  background:rgba(255,255,255,.03); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:12px; cursor:pointer; font-size:13px; transition:.25s;
}
.ctrl-btn:hover{transform:translateY(-2px);border-color:rgba(43,157,244,.4);}
.admin-toggle-wrap{display:flex;justify-content:center;margin-top:14px;position:relative;z-index:1;}
.admin-toggle{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;font-weight:700;
}
.admin-panel{
  display:none;
  margin-top:18px;
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:18px;
}
.admin-panel h2{font-size:18px;margin-bottom:14px;}
.form-grid{display:grid;gap:12px;}
.input,.textarea{
  width:100%;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  color:var(--text);
  border-radius:14px;
  padding:13px 14px;
  outline:none;
}
.textarea{min-height:110px;resize:vertical;}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
.btn{
  border:none;
  color:#fff;
  padding:12px 18px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  transition:.25s;
}
.btn:hover{transform:translateY(-2px);}
.btn-primary{background:linear-gradient(135deg,var(--blue),#37b1ff);box-shadow:0 14px 28px rgba(43,157,244,.22);}
.btn-secondary{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);}
.btn-danger{background:linear-gradient(135deg,var(--red),#ff6969);box-shadow:0 14px 28px rgba(255,77,77,.18);}
.events-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:18px;}
.event-card{
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.event-card::before{
  content:"";position:absolute;right:-28px;bottom:-28px;width:94px;height:94px;border-radius:50%;background:var(--blue-soft);filter:blur(8px);
}
.event-date{
  display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;
  background:var(--blue-soft);color:var(--blue);font-size:12px;font-weight:700;margin-bottom:12px;position:relative;z-index:1;
}
.event-card h3{font-size:18px;margin-bottom:8px;position:relative;z-index:1;word-break:break-word;}
.event-card p{color:var(--sub);line-height:1.55;font-size:14px;position:relative;z-index:1;white-space:pre-line;word-break:break-word;}
.card-actions{display:flex;justify-content:flex-end;margin-top:14px;position:relative;z-index:1;}
.empty-state{
  margin-top:18px;
  padding:28px 18px;
  text-align:center;
  border-radius:22px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,var(--card),var(--card-2));
  box-shadow:var(--shadow);
  color:var(--sub);
}
.password-box{
  position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;
}
.password-card{
  width:100%;max-width:340px;background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:20px;
}
.password-card h3{margin-bottom:12px;font-size:18px;}
.password-card .actions{margin-top:10px;}
@media(max-width:600px){
  .hero{padding:24px 16px 16px;}
  .hero h1{font-size:24px;padding-top:18px;}
  .events-list{grid-template-columns:1fr;}
  .actions{flex-direction:column;}
  .btn{width:100%;}
}
</style>
</head>
<body>
<div class="wrapper">
  <section class="hero">
    <button id="backBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8L10 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 data-ru="Мероприятия" data-kz="Іс-шаралар">Мероприятия</h1>
    <div class="top-controls">
      <button class="ctrl-btn" onclick="toggleTheme()">🌗 Тема</button>
      <button class="ctrl-btn" onclick="setLang('ru')">RU</button>
      <button class="ctrl-btn" onclick="setLang('kz')">KZ</button>
    </div>
    <div class="admin-toggle-wrap">
      <button class="admin-toggle" onclick="openPassword()">A</button>
    </div>
  </section>

  <section id="adminPanel" class="admin-panel">
    <h2 data-ru="Добавить мероприятие" data-kz="Іс-шара қосу">Добавить мероприятие</h2>
    <div class="form-grid">
      <input id="eventTitle" class="input" type="text" data-ru-placeholder="Заголовок" data-kz-placeholder="Тақырып" placeholder="Заголовок">
      <textarea id="eventDescription" class="textarea" data-ru-placeholder="Описание" data-kz-placeholder="Сипаттама" placeholder="Описание"></textarea>
      <input id="eventDate" class="input" type="text" data-ru-placeholder="Дата проведения" data-kz-placeholder="Өтетін күні" placeholder="Дата проведения">
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="addEvent()" data-ru="Добавить" data-kz="Қосу">Добавить</button>
      <button class="btn btn-secondary" onclick="clearForm()" data-ru="Очистить" data-kz="Тазалау">Очистить</button>
    </div>
  </section>

  <div id="eventsList" class="events-list"></div>
  <div id="emptyState" class="empty-state" data-ru="Пока мероприятий нет" data-kz="Әзірге іс-шаралар жоқ">Пока мероприятий нет</div>
</div>

<div class="password-box" id="passwordBox">
  <div class="password-card">
    <h3 data-ru="Вход администратора" data-kz="Әкімші кіруі">Вход администратора</h3>
    <input id="passwordInput" class="input" type="password" data-ru-placeholder="Пароль" data-kz-placeholder="Құпиясөз" placeholder="Пароль">
    <div class="actions">
      <button class="btn btn-primary" onclick="checkPassword()" data-ru="Войти" data-kz="Кіру">Войти</button>
      <button class="btn btn-secondary" onclick="closePassword()" data-ru="Отмена" data-kz="Бас тарту">Отмена</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'olesya2school';
let isAdmin = localStorage.getItem('eventsAdmin') === 'true';
let currentLang = localStorage.getItem('eventsLang') || 'ru';
let eventsData = JSON.parse(localStorage.getItem('eventsData') || '[]');

const eventsList = document.getElementById('eventsList');
const emptyState = document.getElementById('emptyState');
const adminPanel = document.getElementById('adminPanel');
const passwordBox = document.getElementById('passwordBox');
const passwordInput = document.getElementById('passwordInput');

function saveEvents(){
  localStorage.setItem('eventsData', JSON.stringify(eventsData));
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('eventsLang', lang);
  document.querySelectorAll('[data-ru]').forEach(el => {
    el.textContent = el.dataset[lang];
  });
  document.querySelectorAll('[data-ru-placeholder]').forEach(el => {
    el.placeholder = el.dataset[lang + 'Placeholder'];
  });
}

function openPassword(){
  passwordBox.style.display = 'flex';
  passwordInput.value = '';
  setTimeout(() => passwordInput.focus(), 30);
}

function closePassword(){
  passwordBox.style.display = 'none';
}

function checkPassword(){
  if(passwordInput.value === ADMIN_PASSWORD){
    isAdmin = true;
    localStorage.setItem('eventsAdmin', 'true');
    adminPanel.style.display = 'block';
    closePassword();
    renderEvents();
  } else {
    alert(currentLang === 'kz' ? 'Қате пароль' : 'Неверный пароль');
    passwordInput.value = '';
    passwordInput.focus();
  }
}

function clearForm(){
  document.getElementById('eventTitle').value = '';
  document.getElementById('eventDescription').value = '';
  document.getElementById('eventDate').value = '';
}

function addEvent(){
  if(!isAdmin) return;

  const title = document.getElementById('eventTitle').value.trim();
  const description = document.getElementById('eventDescription').value.trim();
  const date = document.getElementById('eventDate').value.trim();

  if(!title || !description || !date) return;

  eventsData.unshift({ title, description, date });
  saveEvents();
  clearForm();
  renderEvents();
}

function deleteEvent(index){
  if(!isAdmin) return;
  eventsData.splice(index, 1);
  saveEvents();
  renderEvents();
}

function renderEvents(){
  eventsList.innerHTML = '';

  adminPanel.style.display = isAdmin ? 'block' : 'none';
  emptyState.style.display = eventsData.length ? 'none' : 'block';

  eventsData.forEach((item, index) => {
    const card = document.createElement('article');
    card.className = 'event-card';

    const date = document.createElement('div');
    date.className = 'event-date';
    date.innerHTML = `<i class="bi bi-calendar-event"></i><span>${item.date}</span>`;
    card.appendChild(date);

    const title = document.createElement('h3');
    title.textContent = item.title;
    card.appendChild(title);

    const description = document.createElement('p');
    description.textContent = item.description;
    card.appendChild(description);

    if(isAdmin){
      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger';
      delBtn.textContent = currentLang === 'kz' ? 'Жою' : 'Удалить';
      delBtn.onclick = () => deleteEvent(index);
      actions.appendChild(delBtn);
      card.appendChild(actions);
    }

    eventsList.appendChild(card);
  });
}

document.getElementById('backBtn').onclick = () => {
  window.location.href = 'index.html';
};

passwordBox.addEventListener('click', (e) => {
  if(e.target === passwordBox) closePassword();
});

window.onload = () => {
  if(isAdmin) adminPanel.style.display = 'block';
  setLang(currentLang);
  renderEvents();
};
</script>
</body>
</html>
