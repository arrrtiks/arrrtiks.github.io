<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мероприятия</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{
  --bg:#0b0f16;
  --card:rgba(24,31,45,.9);
  --card-2:rgba(18,24,36,.94);
  --text:#f8fbff;
  --sub:#9ba7ba;
  --blue:#2b9df4;
  --blue-soft:rgba(43,157,244,.15);
  --border:rgba(255,255,255,.08);
  --shadow:0 18px 38px rgba(0,0,0,.28);
}
.light{
  --bg:#eef3fa;
  --card:rgba(255,255,255,.92);
  --card-2:rgba(255,255,255,.98);
  --text:#111827;
  --sub:#637083;
  --blue:#2b86ef;
  --blue-soft:rgba(43,134,239,.12);
  --border:rgba(17,24,39,.08);
  --shadow:0 16px 32px rgba(57,72,103,.12);
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(43,157,244,.16), transparent 26%),
    radial-gradient(circle at bottom right, rgba(43,157,244,.08), transparent 28%),
    linear-gradient(180deg,var(--bg),#0f1520 60%,var(--bg));
  color:var(--text);
  transition:.3s;
}
body.light{
  background:linear-gradient(180deg,#f6f9ff,#eef3fa 65%,#e7eef8);
}
.wrapper{
  max-width:980px;
  margin:18px auto;
  padding:0 14px 26px;
}
.hero{
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:26px;
  box-shadow:var(--shadow);
  padding:26px 20px 20px;
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:"";
  position:absolute;
  right:-40px;
  top:-40px;
  width:150px;
  height:150px;
  border-radius:50%;
  background:var(--blue-soft);
  filter:blur(12px);
}
#backBtn{
  position:absolute;
  top:16px;
  left:16px;
  width:46px;
  height:46px;
  border:none;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:linear-gradient(135deg,var(--blue),#37b1ff);
  box-shadow:0 12px 25px rgba(43,157,244,.22);
}
.hero h1{
  text-align:center;
  font-size:30px;
  margin-bottom:10px;
  position:relative;
  z-index:1;
}
.top-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  position:relative;
  z-index:1;
}
.ctrl-btn{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
  transition:.25s;
}
.ctrl-btn:hover{
  transform:translateY(-2px);
  border-color:rgba(43,157,244,.4);
}
.events-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-top:18px;
}
.event-card{
  background:linear-gradient(180deg,var(--card),var(--card-2));
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}
.event-card::before{
  content:"";
  position:absolute;
  right:-28px;
  bottom:-28px;
  width:94px;
  height:94px;
  border-radius:50%;
  background:var(--blue-soft);
  filter:blur(8px);
}
.event-date{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 11px;
  border-radius:999px;
  background:var(--blue-soft);
  color:var(--blue);
  font-size:12px;
  font-weight:700;
  margin-bottom:12px;
  position:relative;
  z-index:1;
}
.event-card h3{
  font-size:18px;
  margin-bottom:8px;
  position:relative;
  z-index:1;
  word-break:break-word;
}
.event-card p{
  color:var(--sub);
  line-height:1.55;
  font-size:14px;
  position:relative;
  z-index:1;
  white-space:pre-line;
  word-break:break-word;
}
.empty-state{
  margin-top:18px;
  padding:28px 18px;
  text-align:center;
  border-radius:22px;
  border:1px solid var(--border);
  background:linear-gradient(180deg,var(--card),var(--card-2));
  box-shadow:var(--shadow);
  color:var(--sub);
}
@media(max-width:600px){
  .hero{
    padding:24px 16px 16px;
  }
  .hero h1{
    font-size:24px;
    padding-top:18px;
  }
  .events-list{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <section class="hero">
    <button id="backBtn" aria-label="Назад">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8L10 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <h1 data-ru="Мероприятия" data-kz="Іс-шаралар">Мероприятия</h1>

    <div class="top-controls">
      <button class="ctrl-btn" onclick="toggleTheme()">🌗 <span data-ru="Тема" data-kz="Тақырып">Тема</span></button>
      <button class="ctrl-btn" onclick="setLang('ru')">RU</button>
      <button class="ctrl-btn" onclick="setLang('kz')">KZ</button>
    </div>
  </section>

  <div id="eventsList" class="events-list"></div>
  <div id="emptyState" class="empty-state" data-ru="Пока мероприятий нет" data-kz="Әзірге іс-шаралар жоқ">Пока мероприятий нет</div>
</div>

<script>
let currentLang = localStorage.getItem('eventsLang') || 'ru';
let currentTheme = localStorage.getItem('eventsTheme') || 'dark';
let eventsData = [];

const eventsList = document.getElementById('eventsList');
const emptyState = document.getElementById('emptyState');

function applyTheme() {
  if (currentTheme === 'light') {
    document.body.classList.add('light');
  } else {
    document.body.classList.remove('light');
  }
}

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem('eventsTheme', currentTheme);
  applyTheme();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('eventsLang', lang);

  document.querySelectorAll('[data-ru]').forEach(el => {
    if (lang === 'kz' && el.dataset.kz) {
      el.textContent = el.dataset.kz;
    } else if (el.dataset.ru) {
      el.textContent = el.dataset.ru;
    }
  });

  renderEvents();
}

function renderEvents() {
  eventsList.innerHTML = '';

  if (!Array.isArray(eventsData) || eventsData.length === 0) {
    emptyState.style.display = 'block';
    emptyState.textContent = currentLang === 'kz'
      ? 'Әзірге іс-шаралар жоқ'
      : 'Пока мероприятий нет';
    return;
  }

  emptyState.style.display = 'none';

  eventsData.forEach(item => {
    const card = document.createElement('article');
    card.className = 'event-card';

    const date = document.createElement('div');
    date.className = 'event-date';
    date.innerHTML = `<i class="bi bi-calendar-event"></i><span>${item.date || ''}</span>`;
    card.appendChild(date);

    const title = document.createElement('h3');
    title.textContent = item.title || '';
    card.appendChild(title);

    const description = document.createElement('p');
    description.textContent = item.description || '';
    card.appendChild(description);

    eventsList.appendChild(card);
  });
}

async function loadEvents() {
  try {
    const response = await fetch('events.json?v=' + Date.now());

    if (!response.ok) {
      throw new Error('HTTP error: ' + response.status);
    }

    const data = await response.json();

    if (!Array.isArray(data)) {
      throw new Error('events.json должен быть массивом');
    }

    eventsData = data;
    renderEvents();
  } catch (error) {
    console.error('Ошибка загрузки мероприятий:', error);
    eventsList.innerHTML = '';
    emptyState.style.display = 'block';
    emptyState.textContent = currentLang === 'kz'
      ? 'Іс-шараларды жүктеу қатесі'
      : 'Ошибка загрузки мероприятий';
  }
}

document.getElementById('backBtn').onclick = () => {
  window.location.href = 'index.html';
};

window.onload = () => {
  applyTheme();
  setLang(currentLang);
  loadEvents();
};
</script>
</body>
</html>
